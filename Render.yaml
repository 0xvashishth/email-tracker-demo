services:
  - type: web
    name: email-tracker
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3000
      - key: BASE_URL
        sync: false
      # Gmail SMTP (real sending)
      - key: GMAIL_HOST
        value: smtp.gmail.com
      - key: GMAIL_PORT
        value: 587
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_PASS
        sync: false
      # Ethereal (test / preview)
      - key: ETHEREAL_HOST
        value: smtp.ethereal.email
      - key: ETHEREAL_PORT
        value: 587
      - key: ETHEREAL_USER
        sync: false
      - key: ETHEREAL_PASS
        sync: false
